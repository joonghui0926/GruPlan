services:
  - type: web
    name: gruplan-ai
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: CORS_ORIGINS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: gruplan-db
          property: connectionString
      - key: DATA_GO_KR_SERVICE_KEY
        sync: false
      - key: VWORLD_API_KEY
        sync: false
      - key: VWORLD_REFERER
        value: https://gruplan-ai.onrender.com
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.4-mini
      - key: FIRE_RISK_ENDPOINT
        sync: false
databases:
  - name: gruplan-db
    plan: basic-256mb
    region: oregon
    databaseName: gruplan
    user: gruplan
